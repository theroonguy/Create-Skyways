#Better Zoom Configuration
#The zoom increment step per zoom in/out (higher values zoom/dezoom faster)
# Default: 5.0
# Range: 0.1 ~ 20.0
zoomStep = 5.0
#Mouse sensitivity multiplier while zooming (lower values make it less sensitive)
# Default: 0.01
# Range: 0.01 ~ 1.0
zoomSensitivity = 0.01
#Adjusts mouse sensitivity based on the zoom level
autoAdjustSensitivity = true
#Require holding the zoom key
holdToZoom = true
#Easing factor for zoom transitions (higher = faster/less smooth, lower = slower/more smooth)
# Default: 0.15
# Range: 0.05 ~ 0.2
smoothEasingFactor = 0.15
#Enable smooth zooming transitions (ease in/out)
smoothZoom = true
#Zoom adjustment mode
#Allowed Values: WHEEL, HOTKEYS, BOTH
zoomMode = "BOTH"
#Disables bobbing/bob view while zooming to prevent visual wobble
disableBobbing = true
