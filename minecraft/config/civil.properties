# Civil mod configuration
# simple.* : in-game GUI (written uncommented).
# advanced.* : optional tuning (default lines commented; remove leading # to apply).

# ── Simple (GUI) ──
# Stored release version for simple-settings migration (jar bump reset gated in CivilConfig; opt-out below).
config.simpleSchemaVersion=2.0.0-release
# Remove leading # on the next line to opt out of simple migration when updating the mod jar.
#simple.persistAcrossSchema=true

# Spawn & detection
simple.spawn.suppressionStrength=5
simple.detection.rangeBlocks=240

# Sonar
simple.sonar.detectorEnabled=true
simple.sonar.detectorRadius=5
simple.sonar.staticRadius=10

# Decay
simple.decay.enabled=true
simple.decay.speed=5
simple.decay.floor=25
simple.recovery.speed=5
simple.decay.freshnessHours=6
simple.patrol.rangeVchunks=3

# Farm shrine
simple.farmShrine.suppressStrength=5
simple.farmShrine.suppressRange=8

# Undying anchor
simple.undying.enabled=true
simple.undying.maxSearchRadiusBlocks=128
simple.undying.globalCooldownSeconds=10

# Zone HUD
simple.zoneHud.transitionEnabled=true
simple.zoneHud.label.civilized=
simple.zoneHud.label.wilderness=
simple.zoneHud.label.caution=
simple.zoneHud.label.shrine=
simple.zoneHud.cooldownSeconds=10
simple.zoneHud.anchorOffsetXPercent=0
simple.zoneHud.anchorOffsetYPercent=30
simple.zoneHud.fontScalePercent=100

# Map compat (chunk band)
simple.mapCompat.journeyMapChunkBand=true
simple.mapCompat.xaerosChunkBand=true
simple.mapCompat.exploreRadiusChunks=4

# Mob flee
simple.mobFlee.enabled=true

# Presence keepalive
simple.presenceKeepalive.enabled=true

